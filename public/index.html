<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DanjiLab — 수도권 아파트 단지 비교지도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand" onclick="location.reload()">DanjiLab <span>DB</span></div>
  <div class="searchbox"><span>⌕</span><input id="q" placeholder="단지명·동·주소 검색 예: 헬리오시티, 반포, 광교" /></div>
  <button class="btn ghost" id="geocodeBtn">좌표 생성</button>
  <button class="btn gold" id="compareOpen">비교하기</button>
</header>

<main class="layout">
  <aside class="panel">
    <section class="heroCard">
      <div class="eyebrow">MOLIT APARTMENT DB</div>
      <h1>수도권 아파트<br/>단지 비교지도</h1>
      <p>국토부 공동주택 단지 기본정보 기반. 카카오 검색 DB가 아니라 실제 공동주택 DB로 단지를 표시합니다.</p>
      <div class="stats">
        <div><label>전체 단지</label><strong id="statTotal">-</strong></div>
        <div><label>좌표 상태</label><strong id="statCoord">확인중</strong></div>
      </div>
    </section>

    <section class="filters">
      <select id="sido"><option value="">수도권 전체</option></select>
      <select id="sigungu"><option value="">전체 시군구</option></select>
      <button id="apply" class="btn gold full">적용</button>
      <div class="chips">
        <button data-chip="large">대단지 1000세대↑</button>
        <button data-chip="new">신축 10년↓</button>
        <button data-chip="seoul">서울</button>
      </div>
    </section>

    <section class="listWrap">
      <div class="listHead"><strong>검색 결과</strong><span id="resultCount">-</span></div>
      <div id="list" class="list"></div>
    </section>
  </aside>

  <section id="map" class="map"><div class="mapLoading">지도 불러오는 중...</div></section>

  <aside id="detail" class="detail empty">
    <button class="close" id="closeDetail">×</button>
    <div class="emptyText">지도나 목록에서 단지를 선택하면<br/>상세정보와 유사 단지를 보여드립니다.</div>
  </aside>
</main>

<div id="compareModal" class="modalBg">
  <div class="modal">
    <button class="close" id="closeCompare">×</button>
    <h2>단지 A/B 비교</h2>
    <p>검색 결과에서 단지를 선택하거나 상세 패널에서 비교 추가를 누르세요.</p>
    <div class="compareSlots">
      <div><label>단지 A</label><select id="cmpA"></select></div>
      <div><label>단지 B</label><select id="cmpB"></select></div>
    </div>
    <button id="runCompare" class="btn gold full">비교분석 실행</button>
    <div id="compareResult" class="compareResult"></div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
